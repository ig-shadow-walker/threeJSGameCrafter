interface:
  display_name: "Three.js 3D Generator"
  short_description: "Generate, texture, rig, animate, and convert Three.js game assets"
  default_prompt: "Generate a game-ready 3D asset for a Three.js game. First choose an integration path: use the Alpha3D MCP tools if the connector is available, else the ALPHA3D_API_KEY REST client (run the credential probe first), else fall back to procedural. Load the matching reference (mcp-integration.md or api-notes.md) plus threejs-integration.md, and image-generator-workflows.md when a 2D concept/reference/texture/logo would improve the result. Download outputs immediately (URLs expire), and report the chosen path, reference ledger, job IDs, files, and Three.js import/performance notes."
